name: EventGuard Telemetry Guard

on:
  pull_request:
    paths:
      - 'maps/**'
      - '**.go'

jobs:
  impact-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to find parent SHAs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build EventGuard
        run: go build -o event_guard main.go

      - name: Run Tests
        run: go test ./...

      - name: Run Impact Check
        run: |
          chmod +x ./event_guard
          ./event_guard impact-check --prev-sha ${{ github.event.pull_request.base.sha }}