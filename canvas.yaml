version: "2.1.0"
identity_properties: ["userId", "anonymousId"]

contexts:
  Global:
    properties:
      library_name: {type: string, required: true}
      library_version: {type: string, required: true}
      session_id: {type: string, required: true}

  Browser:
    inherits: ["Global"]
    properties:
      "context.browser.user_agent": {type: string, required: true}
      "context.browser.viewport_width": {type: number, required: true}
      "context.browser.viewport_height": {type: number, required: true}
      "context.browser.language": {type: string}

  Navigation:
    properties:
      anonymousId: {type: string, required: true}
      "context.page.url": {type: string, required: true}
      "context.page.path": {type: string, required: true}
      "context.page.referrer": {type: string}
      "context.page.title": {type: string}
      "context.page.trigger": 
        type: string
        required: true
        enum: ["click", "back_button", "forward_button", "deep_link", "reload"]

  Campaign:
    properties:
      "context.campaign.source": {type: string}
      "context.campaign.medium": {type: string}
      "context.campaign.name": {type: string}
      "context.campaign.term": {type: string}
      "context.campaign.content": {type: string}

  Experiment:
    properties:
      "context.experiment.id": {type: string}
      "context.experiment.variant": {type: string}
      "context.experiment.is_control": {type: boolean}

events:
  "Page Viewed":
    category: "NAVIGATION"
    entity_type: "Page"
    inherits: ["Browser", "Navigation", "Campaign"]
    properties:
      userId: {type: string}
      anonymousId: {type: string, required: true}

  "Element Clicked":
    category: "INTERACTION"
    entity_type: "UIElement"
    inherits: ["Browser", "Navigation"]
    properties:
      element_id: {type: string}
      element_text: {type: string}
      element_type: {type: string, required: true, enum: ["button", "link", "cta", "icon"]}
      target_url: {type: string}

  "Form Submitted":
    category: "CONVERSION"
    entity_type: "Form"
    inherits: ["Browser", "Navigation"]
    properties:
      form_id: {type: string, required: true}
      form_name: {type: string}
      is_success: {type: boolean, required: true}
      error_message: {type: string}
      field_count: {type: number}

  "Deep Link Opened":
    category: "ACQUISITION"
    entity_type: "App"
    inherits: ["Browser", "Navigation", "Campaign"]
    properties:
      original_url: {type: string, required: true}
      protocol: {type: string, required: true, enum: ["http", "https", "custom"]}
      is_deferred: {type: boolean}

  "Order Completed":
    category: "REVENUE"
    entity_type: "Order"
    inherits: ["Browser", "Navigation", "Campaign"]
    properties:
      order_id: {type: string, required: true}
      total: {type: number, required: true}
      revenue: {type: number, required: true}
      currency: {type: string, required: true, enum: ["USD", "EUR", "GBP"]}
      shipping: {type: number}
      tax: {type: number}
      coupon: {type: string}
      "products.count": {type: number, required: true}

  "A/B Test Assigned":
    category: "GROWTH"
    entity_type: "Experiment"
    inherits: ["Browser", "Navigation", "Experiment"]
    properties:
      experiment_name: {type: string, required: true}
      variant_name: {type: string, required: true}

  "Error Occurred":
    category: "TECHNICAL"
    entity_type: "Application"
    inherits: ["Browser", "Navigation"]
    properties:
      error_code: {type: string, required: true}
      message: {type: string, required: true}
      severity: {type: string, enum: ["info", "warning", "critical"]}
      stack_trace: {type: string}
